version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: real-estate-db
    restart: always
    environment:
      POSTGRES_USER: realestate
      POSTGRES_PASSWORD: realestate_pass
      POSTGRES_DB: real_estate_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realestate"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (FastAPI)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: real-estate-backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://realestate:realestate_pass@db:5432/real_estate_db
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - FRONTEND_URL=http://localhost:3000
      - STRIPE_SECRET_KEY=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
      - STRIPE_WEBHOOK_SECRET=whsec_FuynoV3E98dOFlenuE4Q06CVGHvXdd4j
      - STRIPE_PRO_PRICE_ID=${STRIPE_PRO_PRICE_ID:-price_xxx}
      - STRIPE_INVESTOR_PRICE_ID=${STRIPE_INVESTOR_PRICE_ID:-price_xxx}
      - RENTCAST_API_KEY=${RENTCAST_API_KEY:-}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: real-estate-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_live_51TAJWeDnvjVgmTf6Z4oefqgnsSlkDXixUHEm6VTqVmoRcKYPzRBVlqc51PuTgnOMyYQrsFW4jsquLEQFPeI4SJvR00QMvWrMNg
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next

volumes:
  postgres_data:
